        /* The active listening state */
/* 1. The Active State */

/* Active recording state with smooth breathing animation */


/* Optional: Add a pulsing dot indicator */
.input-wrapper.listening-active::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    /* background-color: #ff0000; */
    border-radius: 50%;
    margin-right: 8px;
    animation: dot-pulse 2s ease-in-out infinite;
    vertical-align: middle;
}


@keyframes dot-pulse {
    0% {
        opacity: 1;
        transform: scale(1);
        background-color: #ff0000;
    }
    50% {
        opacity: 0.5;
        transform: scale(0.8);
        background-color: #ff6666;
    }
    100% {
        opacity: 1;
        transform: scale(1);
        background-color: #ff0000;
    }
}


                /* Sets up the 3D space and depth */
        .logo-scene {
        width: 250px;       /* Adjust size as needed */
        height: 250px;      /* Adjust size as needed */
        perspective: 800px; /* Gives the 3D depth effect */
        margin: 50px auto;  /* Centers it on the page */
        }

        /* The element that actually rotates */
        .logo-spinner {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        /* Adjust '5s' to make the spin faster or slower */
        animation: spinLeftToRight 10s linear infinite; 
        }

        .logo-spinner img{
            transition: transform 0.5s ease;
        }

        /* Base styles for both sides of the 'coin' */
        .logo-face {
        position: absolute;
        width: 100%;
        height: 100%;
        /* This is the magic property that hides the reversed image */
        backface-visibility: hidden; 
        border-radius: 50%; /* Optional: keeps things neat if background isn't pure white */
        object-fit: contain;
        }

        /* The back face is pre-flipped so it looks normal when the spinner rotates 180 degrees */
        .logo-back {
        transform: rotateY(180deg);
        }

        /* The infinite left-to-right rotation */
        @keyframes spinLeftToRight {
        from {
            transform: rotateY(0deg);
        }
        to {
            transform: rotateY(0deg);
        }
        }


        .user-wrapper, .ai-response-container {
            position: relative;
            group: hover;
        }

            position: absolute;
            top: 5px;

            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;

        .log-entry:hover .copy-btn {

            opacity: 1; /* Show button on hover */

        /* Base Sidebar (Desktop) */
.sidebar {
    width: 280px;
    background: var(--bg-side);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    transition: transform 0.3s ease-in-out, left 0.3s ease-in-out;
    position: relative;
    height: 100vh;
    z-index: 1000;
    scrollbar-width: none;
}

/* Mobile Responsiveness (Screens < 768px) */
@media (max-width: 768px) {
    /* 1. Root Layout Fix: Prevent the whole page from bouncing */
    html, body {
        overflow: hidden;
        height: 100dvh;
        width: 100%;
        position: fixed;
    }
    

.log-entry{
    margin: 0px !important;
}

.ai-response p{
    margin-bottom: 2rem !important; 
}

    /* 2. App Shell: Force to fill the dynamic viewport */
    .app-shell {
        height: 100dvh !important;
        display: flex;
        flex-direction: row;
        overflow: hidden;
    }

    /* 3. Sidebar: Off-canvas overlay logic */
    .sidebar {
        position: fixed;
        top: 0;
        left: -280px; 
        bottom: 0;
        height: 100dvh;
        width: 280px;
        z-index: 2000;
        background: var(--bg-side);
        box-shadow: 10px 0 20px rgba(0,0,0,0.3);
        transition: left 0.3s ease-in-out;
    }

    .sidebar.active {
        left: 0;
    }

    /* 4. Content Area: Vertical Flexbox for Top-bar/Chat/Input */
    .content-area {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        width: 100vw;
        overflow: hidden;
        background: var(--bg-main);
    }

    /* 5. Top Bar: Balanced for Mobile */
    .top-bar {
        flex-shrink: 0; /* Prevents header from shrinking */
        height: 60px;
        padding: 0 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between !important;
        border-bottom: 1px solid var(--border);
        z-index: 10;
    }

    #mobileMenuBtn {
        display: flex !important;
        color: var(--text-main);
        background: none;
        border: none;
        font-size: 1.5rem;
        padding: 0;
        transition: opacity 0.3s ease;
    }

    .breadcrumb-area, #compu-user {
        display: none !important; /* Hide desktop elements */
    }

    #responsive-logo {
        display: flex !important;
        flex: 1;
        justify-content: center;
        pointer-events: none;
    }

    /* 6. Chat Viewport: THE SCROLL ZONE */
    .chat-viewport {
        flex: 1; /* Takes all available space between header and footer */
        overflow-y: auto !important;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch; /* Smooth iOS momentum scroll */
        padding: 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    /* 7. Input Container: Pinned to bottom */
    .input-container {
        flex-shrink: 0;
        padding: 10px 15px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* Notch support */
        background: var(--bg-main);
        border-top: 1px solid var(--border);
    }

    .input-wrapper {
        width: 100% !important;
        margin: 0 auto;
    }

    /* Adjust font size for mobile inputs to prevent iOS auto-zoom */
    #userInput {
        font-size: 16px !important;
    }

    /* 8. Animations: Smooth Red Fade for Listening */
    .input-wrapper.listening-active {
        border: 1px solid rgba(255, 0, 0, 1) !important;
        animation: niharika-breathe 1.5s ease-in-out infinite;
    }
}

@keyframes niharika-breathe {
    0%, 100% { border-color: rgba(255, 0, 0, 1); }
    50% { border-color: rgba(255, 0, 0, 0.2); }
}

/* Enhanced Callouts */
.ai-callout {
    padding: 10px 20px;
    margin: 1.5rem 0;
    border-radius: 20px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    border: 1px solid transparent;
    transition: transform 0.2s ease;
}

    margin: 0;
    color: #334155; /* Professional slate gray */

    line-height: 1.6;
    font-weight: 500;
}

/* Note Variant */
.ai-callout.note {
    background-color: var(--bg-note);
    border-color: rgba(0, 112, 243, 0.1);
    align-items: center;
    border-left: 3px solid var(--primary-blue);
    color: #0056b3;
}
.ai-callout.note:hover {
    background-color: #e6f2ff;
    transition: background-color 0.3s ease;
}

/* Warning Variant */
.ai-callout.warning {
    background-color: var(--bg-warning);
    border-color: rgba(245, 158, 11, 0.1);
    border-left: 4px solid var(--warning-gold);
    color: #92400e;
}

    box-shadow: 0 2px 8px rgba(0, 112, 243, 0.15);
}

    background: #fff;
    color: #333;
}

.icon-control-btn.on:hover {
    color: #0056b3;
}

/* Indicator dot for activity */
.icon-control-btn.on::after {
    content: '';

    top: 6px;
    right: 6px;
    width: 6px;
    height: 6px;
    background: #0070f3;
    border-radius: 50%;
    border: 1px solid #fff;

/* --- DARK MODE: FORCE NORMAL LOOK EVEN IF DENIED --- */

    color: #f2f2f2 !important;

    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Force the Icon to Indigo/Soft White even if denied */

[data-theme="dark"] .icon-control-btn.on.denied i {
    color: #818cf8 !important; /* Indigo accent */
    animation: none !important; /* Stop the red pulsing animation */
    filter: none !important;
}

/* Optional: Subtle indicator that it's actually 'denied' without turning red */

    border-color: rgba(255, 77, 77, 0.3) !important; /* Tiny red hint only when clicked */
}

function formatAIText(text) {
    if (!text) return "";

    let formatted = text;

    // 1. ESCAPE HTML (Security: prevents XSS if AI outputs raw <script> tags)
    // Only do this if you aren't expecting the AI to output valid raw HTML
    // formatted = formatted.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // 2. Hyperlinks: [[link | url | text]]
    formatted = formatted.replace(/\[\[link\s*\|\s*(.*?)\s*\|\s*(.*?)\s*\]\]/gs, 
        '<a href="$1" target="_blank" class="ai-link"><i class="bi bi-box-arrow-up-right"></i> $2</a>');

    // 3. Tables: [[table | Header1 | Header2 || Row1Col1 | Row1Col2 ]]
    formatted = formatted.replace(/\[\[table\s*\|\s*(.*?)\s*\]\]/gs, (match, content) => {
        const sections = content.split('||');
        if (sections.length < 1) return match;
        const headers = sections[0].split('|').filter(h => h.trim()).map(h => `<th>${h.trim()}</th>`).join('');
        
        let rows = "";
        for (let i = 1; i < sections.length; i++) {
            const cells = sections[i].split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
            if (cells) rows += `<tr>${cells}</tr>`;
        }
        return `<div class="ai-table-container"><table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
    });

    // 4. Headers: [[h1 | text]] to [[h6 | text]]
    formatted = formatted.replace(/\[\[(h[1-6])\s*\|\s*(.*?)\s*\]\]/gs, '<$1 class="ai-header">$2</$1>');

    // 5. Callouts (Notes, Warnings, Success, Info)
    const callouts = {
        note: { icon: 'bi-info-circle', class: 'note' },
        warning: { icon: 'bi-exclamation-triangle', class: 'warning' },
        success: { icon: 'bi-check-circle', class: 'success' },
        info: { icon: 'bi-lightbulb', class: 'info' }
    };
    Object.keys(callouts).forEach(key => {
        const regex = new RegExp(`\\[\\[${key}\\s*\\|\\s*(.*?)\\s*\\]\\]`, 'gs');
        formatted = formatted.replace(regex, `<div class="ai-callout ${callouts[key].class}"><i class="bi ${callouts[key].icon}"></i><span>$1</span></div>`);
    });

    // 6. Code Blocks: [[code | lang | content]]
    formatted = formatted.replace(/\[\[code\s*\|\s*(.*?)\s*\|\s*(.*?)\s*\]\]/gs, (match, lang, content) => {
        return `<div class="ai-code-block">
                    <div class="code-header"><span>${lang.toUpperCase()}</span><button class="copy-btn" onclick="copyCode(this)"></button></div>
                    <pre><code>${content.trim()}</code></pre>
                </div>`;
    });

    // 7. Inline Text Styling (Strict Tags)
    formatted = formatted.replace(/\[\[b\s*\|\s*(.*?)\s*\]\]/g, '<strong>$1</strong>');
    formatted = formatted.replace(/\[\[i\s*\|\s*(.*?)\s*\]\]/g, '<em>$1</em>');
    formatted = formatted.replace(/\[\[s\s*\|\s*(.*?)\s*\]\]/g, '<del>$1</del>');

    // 8. Markdown Fallbacks (In case AI forgets your strict rules)
    formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); // **bold**
    formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');             // *italic*
    formatted = formatted.replace(/`(.*?)`/g, '<code class="inline-code">$1</code>'); // `code`

    // 9. Lists: • Item (Supports multiline and proper grouping)
    formatted = formatted.replace(/^•\s*(.*)/gm, '<li>$1</li>');
    formatted = formatted.replace(/(<li>(?:.|\n)*?<\/li>)+/g, '<ul>$&</ul>');

    // 10. Paragraphs & Line Breaks
    // Converts double newlines to paragraphs and single newlines to <br>
    formatted = formatted.split(/\n\n+/).map(para => {
        if (para.startsWith('<div') || para.startsWith('<ul') || para.startsWith('<h')) return para;
        return `<p>${para.replace(/\n/g, '<br>')}</p>`;
    }).join('');

    return formatted;
}

async function copyTableToClipboard(tableId, btn) {
    const table = document.getElementById(tableId);
    if (!table) {
        console.error("Table not found:", tableId);
        return;
    }

    try {
        // Prepare HTML for Excel-friendly pasting
        const blob = new Blob([table.outerHTML], { type: "text/html" });
        const data = [new ClipboardItem({ ["text/html"]: blob })];
        
        await navigator.clipboard.write(data);
        
        // Success Feedback
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-check2 text-success"></i> Copied!';
        btn.classList.add('btn-outline-success');
        
        setTimeout(() => {
            btn.innerHTML = originalContent;
            btn.classList.remove('btn-outline-success');
        }, 2000);
    } catch (err) {
        console.warn("ClipboardItem failed, trying fallback...", err);
        // Fallback: Copy as plain text if HTML copy is blocked (common on non-HTTPS)
        try {
            await navigator.clipboard.writeText(table.innerText);
            btn.innerHTML = '<i class="bi bi-check2 text-success"></i> Text Copied!';
            setTimeout(() => { btn.innerHTML = originalContent; }, 2000);
        } catch (fallbackErr) {
            alert("Copy failed. Please ensure you are using HTTPS or Localhost.");
        }
    }
}

function saveToThread(role, content) {
    // Ensure we have a thread to save to
    if (!currentThreadId) {
        currentThreadId = 'chat_' + Date.now();
    }

    let history = JSON.parse(localStorage.getItem('niharika_threads') || '[]');
    let threadIndex = history.findIndex(t => t.id === currentThreadId);

    // If it's a new thread, create the object
    if (threadIndex === -1) {
        const newThread = {
            id: currentThreadId,
            title: content.substring(0, 35) + (content.length > 35 ? "..." : ""),
            messages: [],
            timestamp: Date.now()
        };
        history.unshift(newThread);
        threadIndex = 0;
    }

    // Add message to the thread's array
    history[threadIndex].messages.push({
        role: role,
        content: content,
        time: new Date().toLocaleTimeString()
    });

    // Update timestamp and move to top of sidebar
    history[threadIndex].timestamp = Date.now();
    const updatedThread = history.splice(threadIndex, 1)[0];
    history.unshift(updatedThread);

    localStorage.setItem('niharika_threads', JSON.stringify(history.slice(0, 50)));
    renderHistory();
}

        // --- AI MESSAGE ---
        msgDiv.className = 'log-entry assistant-wrapper animate__animated animate__fadeIn';
        const formattedContent = typeof formatAIText === 'function' ? formatAIText(content) : content;

        msgDiv.innerHTML = `
            <div class="ai-response">
                <div class="status-area"></div> <div class="ai-content">${formattedContent}</div>
            </div>
            <div class="action-bar mt-2">
                <button class="copy-btn" onclick="copyText(this, \`${safeContent}\`)">
                    <i class="bi bi-clipboard"></i>
                </button>
            </div>`;
        
        viewport.appendChild(msgDiv);

        // RE-RENDER SAVED NODES: If this chat was loaded from sidebar history
        if (savedNodes && savedNodes.length > 0) {
            const statusArea = msgDiv.querySelector('.status-area');
            savedNodes.forEach(nodeData => {
                const nodeEl = document.createElement('div');
                nodeEl.className = 'status-node';
                nodeEl.innerHTML = `<i class="${nodeData.icon}"></i><span>${nodeData.label}</span>`;
                statusArea.appendChild(nodeEl);
            });
        }
        
        // Snap to nearest for AI so we don't hide the user query
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Only save to localStorage if this is a fresh interaction
    if (shouldSave) {
        saveToThread(role, content);
    }
}




function updateLastMessageNodes(nodes) {

    let thread = history.find(t => t.id === currentThreadId);
    
    if (thread && thread.messages.length > 0) {
        // Add nodes to the last message (the AI response)
        thread.messages[thread.messages.length - 1].nodes = nodes;
        localStorage.setItem('niharika_threads', JSON.stringify(history));
    }
}

// --- GLOBAL LOGO CONTROLLER ---
let aiLogoState = {
    state: 0, 
    intensity: 0.25,
    morphFactor: 0.0 // 0.0 = Sphere, 1.0 = Hourglass
};

function setLogoState(mode) {
    const modes = { 'ideal': 0, 'listening': 1, 'thinking': 2, 'speaking': 3 };
    aiLogoState.state = modes[mode] || 0;
    
    // Set targets for the morphing logic
    if (mode === 'thinking') {
        aiLogoState.morphFactor = 1.0;
        aiLogoState.intensity = 0.1;
    } else {
        aiLogoState.morphFactor = 0.0;
        aiLogoState.intensity = (mode === 'listening') ? 0.4 : 0.25;
    }
}

(function() {
    window.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('ai-container');
        const canvas = document.getElementById('ai-canvas');
        if (!container || !canvas) return;

        const scene = new THREE.Scene();
        // High-end renderer settings for "Apple-style" clarity
        const renderer = new THREE.WebGLRenderer({ 
            canvas, 
            antialias: true, 
            alpha: true,
            powerPreference: "high-performance"
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        camera.position.z = 2.4;

        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            uniform float uTime;
            uniform float uIntensity;
            uniform float uMorph;
            uniform float uState;

            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vec3 pos = position;

                // --- PREMIUM HOURGLASS MORPH ---
                // Using power functions for a more "organic" liquid stretch
                float stretch = 1.0 - (uMorph * 0.85 * (1.0 - pow(abs(pos.y), 1.2)));
                pos.x *= stretch;
                pos.z *= stretch;

                // --- 7-STATE BEHAVIOR MATRIX ---
                float noise = sin(pos.y * 12.0 + uTime * 3.0) * cos(pos.x * 12.0 + uTime * 2.0);
                
                if (uState == 1.0) { // LISTENING: High-tension ripples
                    pos += normal * sin(pos.y * 60.0 + uTime * 35.0) * 0.08;
                } 
                else if (uState == 2.0) { // THINKING: Internal pressure
                    pos += normal * sin(uTime * 8.0 + pos.y * 15.0) * 0.04;
                } 
                else if (uState == 3.0) { // SPEAKING: Vertical Vocal Stream
                    float wave = sin(uTime * 18.0 + pos.y * 5.0);
                    pos.x += wave * 0.03 * pos.y;
                    pos.z += wave * 0.03 * pos.y;
                    pos.y += wave * 0.02;
                } 
                else if (uState == 4.0) { // ANALYZING: Stepped Logic
                    pos += normal * floor(sin(pos.y * 20.0 + uTime * 10.0) * 5.0) / 50.0;
                } 
                else if (uState == 5.0) { // SUCCESS: Harmonic Expansion
                    pos += normal * (uIntensity + 0.15);
                } 
                else if (uState == 6.0) { // ERROR: Kinetic Jitter
                    pos += normal * sin(uTime * 60.0 + pos.x * 100.0) * 0.04;
                } 
                else { // IDLE: Deep Breath
                    pos += normal * sin(pos.x * 1.5 + pos.y * 1.5 + uTime) * (uIntensity * 0.6);
                }

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            uniform float uTime;
            uniform vec3 uColor;
            uniform float uState;

            void main() {
                vec3 viewDir = normalize(vViewPosition);
                vec3 normal = normalize(vNormal);

                // Fresnel (Edge Highlight) - Optimized for White Backgrounds
                // We add a subtle dark rim to provide contrast against white
                float fresnel = pow(1.0 - dot(normal, viewDir), 2.5);
                
                // Internal Glow Calculation
                float interior = 1.0 - fresnel;
                
                // Dynamic Lighting Layers
                vec3 baseColor = uColor;
                vec3 rimColor = uColor * 1.4;
                vec3 coreColor = mix(baseColor, vec3(1.0), 0.2); // SSS white core

                // Final Color mix
                vec3 finalColor = mix(coreColor, rimColor, fresnel);
                
                // Add "Glass Shine"
                float spec = pow(max(dot(reflect(-viewDir, normal), vec3(0.5, 0.5, 1.0)), 0.0), 32.0);
                finalColor += spec * 0.4;

                // Opacity logic to keep it "solid" but soft
                float alpha = smoothstep(0.0, 0.1, fresnel + 0.85);

                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            transparent: true,
            uniforms: {
                uTime: { value: 0 },
                uIntensity: { value: 0.25 },
                uMorph: { value: 0 },
                uState: { value: 0 },
                uColor: { value: new THREE.Color(0.1, 0.5, 1.0) }
            }
        });

        const sphere = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), material);
        scene.add(sphere);

        // Figma-Grade Color Palette
        const palette = {
            0: new THREE.Color(0.10, 0.45, 0.95), // Idle: Deep Blue
            1: new THREE.Color(0.95, 0.10, 0.25), // Listening: Ruby
            2: new THREE.Color(0.40, 0.20, 0.90), // Thinking: Electric Indigo
            3: new THREE.Color(0.95, 0.70, 0.10), // Speaking: Gold
            4: new THREE.Color(0.20, 0.90, 0.40), // Analyzing: Emerald
            5: new THREE.Color(0.10, 0.95, 0.85), // Success: Bright Cyan
            6: new THREE.Color(0.95, 0.40, 0.10)  // Error: Burnt Orange
        };

        let targetRotation = 0;
        let lastSwitchTime = 0;

        function animate(time) {
            const t = time * 0.001;
            material.uniforms.uTime.value = t;
            
            if (typeof aiLogoState !== 'undefined') {
                const state = aiLogoState.state || 0;
                material.uniforms.uState.value = state;

                // Smoothly interpolate color
                const targetColor = palette[state] || palette[0];
                material.uniforms.uColor.value.lerp(targetColor, 0.06);

                // Smoothly interpolate shape
                material.uniforms.uMorph.value = THREE.MathUtils.lerp(material.uniforms.uMorph.value, aiLogoState.morphFactor || 0, 0.07);
                material.uniforms.uIntensity.value = THREE.MathUtils.lerp(material.uniforms.uIntensity.value, aiLogoState.intensity || 0.25, 0.08);

                // --- PROFESSIONAL MOTION LOGIC ---
                if (state === 2) { // Thinking: Strategic Quantum Rotation
                    if (t - lastSwitchTime > 1.5) {
                        targetRotation += Math.PI * 0.5;
                        lastSwitchTime = t;
                    }
                    sphere.rotation.y = THREE.MathUtils.lerp(sphere.rotation.y, targetRotation, 0.05);
                    sphere.rotation.x += 0.01;
                } else if (state === 3) { // Speaking: Static Focus
                    sphere.rotation.y *= 0.98;
                    sphere.rotation.x *= 0.98;
                } else { // Idle: Premium Drift
                    sphere.rotation.y += 0.006;
                    sphere.rotation.x = Math.sin(t * 0.5) * 0.1;
                    targetRotation = sphere.rotation.y;
                }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    });
})();


// --- GLOBAL STATES ---
let recognition;
let isAISpeaking = false;
let isMicEnabled = false;       // Master toggle for listening
let isSpeechEnabled = false;     // Master toggle for AI output

// --- 1. INITIALIZATION ---
function initVoiceRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return console.error("Speech Recognition not supported.");

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-IN';

    // Handle Permission Denied or Errors
    recognition.onerror = (event) => {
        if (event.error === 'not-allowed') {
            const btn = document.getElementById('micToggle');
            if (btn) {
                btn.classList.add('denied');
                btn.innerHTML = `<i class="bi-mic-mute" style="color: red"></i> `;
                btn.title = "Microphone access denied. Please enable it in browser settings."
                setLogoState('idle')
                toggleMic()
            }
            isMicEnabled = false;
            console.log("Microphone access denied. Please enable it in browser settings.");
        }
    };

    // 1. Setup: Ensure these settings are active in your Recognition instance
recognition.interimResults = true; // THIS IS KEY for live streaming
recognition.continuous = true;

const userInputField = document.getElementById('userInput');
var VoiceStatus = "Waiting..."
recognition.onresult = (event) => {
    let interimTranscript = '';
    let finalTranscript = '';

    // Loop through results to separate what is "Final" from what is "Still Processing"
    for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
        } else {
            interimTranscript += event.results[i][0].transcript;
        }
    }

    // Combined text represents exactly what the user is saying RIGHT NOW
    const liveText = (finalTranscript + interimTranscript).toLowerCase();

    // 2. LIVE APPENDING: Update the UI while speaking
    if (liveText.includes("niharika")) {
        let liveQuery = liveText.split(/hey niharika|niharika/).pop().trim();
        VoiceStatus = "Active";

        if (userInputField) {
            userInputField.value = liveQuery;
            userInputField.scrollLeft = userInputField.scrollWidth;
        }

        // 3. EXECUTION: Trigger AI when user stops (isFinal)
        const lastResult = event.results[event.results.length - 1];
        if (lastResult.isFinal && liveQuery.length > 2) {
            console.log("Speech Finished. Sending Query:", liveQuery);
            VoiceStatus = "Thinking...";
            
            // Stop mic to prevent feedback loop
            recognition.stop(); 
            setLogoState('thinking');
            
            // 1. Send the query
            askNiharika(liveQuery); 
            
            // 2. CLEAR the input field (using .value for inputs)
            userInputField.value = ''; 
            
            // 3. Update UI classes if you have them
            const wrapper = document.querySelector('.input-wrapper');
            if (wrapper) wrapper.classList.remove('listening-active');
        }
    }
};
    recognition.onend = () => {
        // Automatically restart only if toggled ON and AI isn't currently talking
        if (isMicEnabled && !isAISpeaking) {
            try { recognition.start(); } catch(e) {}
        }
    };
}




function speakText(text) {
    // 1. Force Reset & Pre-flight checks
    window.speechSynthesis.cancel();
    if (!isSpeechEnabled || !text) return;

    // 2. Mobile Audio Unlock
    const silentIncentive = new SpeechSynthesisUtterance("");
    window.speechSynthesis.speak(silentIncentive);

    isAISpeaking = true;
    
    // Stop recognition while speaking so Niharika doesn't hear herself
    if (recognition) {
        try { recognition.stop(); } catch(e) {}
    }

    if (typeof setLogoState === "function") setLogoState('speaking');

    // 3. Text Cleaning (Markdown & Symbols)
    let cleanText = text
        .replace(/\[\[(?:b|note|warning|table|code)\s*\|\s*(.*?)\s*\]\]/gs, '$1')
        .replace(/[*_#~`]/g, '') 
        .replace(/(\w):(\s|$)/g, '$1$2')
        .replace(/[|\[\]\\^]/g, ' ')
        .replace(/•/g, '')
        .replace(/\s+/g, ' ')
        .trim();

    const utterance = new SpeechSynthesisUtterance(cleanText);

    // 4. Voice Selection (Female Indian/UK English)
    const voices = window.speechSynthesis.getVoices();
    const preferredVoice = 
        voices.find(v => v.name.includes('India') && v.name.includes('Female')) || 
        voices.find(v => v.name.includes('Google UK English Female')) ||
        voices.find(v => v.name.includes('Samantha')) || 
        voices.find(v => v.lang.includes('en') && v.name.includes('Female')) ||
        voices[0];
    
    if (preferredVoice) utterance.voice = preferredVoice;
    
    utterance.pitch = 1.05; 
    utterance.rate = 1.0;
    utterance.volume = 1.0;

    // 5. Chrome Heartbeat Fix
    const keepAlive = setInterval(() => {
        if (!window.speechSynthesis.speaking) {
            clearInterval(keepAlive);
        } else {
            window.speechSynthesis.pause();
            window.speechSynthesis.resume();
        }
    }, 10000);

    // --- 6. THE AUTO-LISTENING LOGIC ---
    utterance.onend = () => {
        clearInterval(keepAlive);
        isAISpeaking = false;
        
        if (typeof setLogoState === "function") setLogoState('ideal');

        // Only auto-start mic if the user has the Mic Toggle turned ON
        if (isMicEnabled) {
            // We wait 400ms to allow the audio hardware to settle
            setTimeout(() => {
                if (typeof startNiharikaListening === "function") {
                    startNiharikaListening();
                    console.log("Niharika: Mic reactivated for next prompt.");
                }
            }, 400);
        }
    };

    utterance.onerror = (event) => {
        clearInterval(keepAlive);
        console.error("Speech Error:", event);
        isAISpeaking = false;
        if (typeof setLogoState === "function") setLogoState('ideal');
    };

    // 7. Execute
    window.speechSynthesis.speak(utterance);
}

// 7. Critical: Mobile browsers load voices asynchronously
// This ensures voices are ready before you call speakText
window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
};

// 3. The Visual Updater (Robust and Safe)
function updateSpeechUI() {
    const btn = document.getElementById('speechToggle');
    const icon = document.getElementById('speechIcon');
    if (!btn || !icon) return;

    if (isSpeechEnabled) {
        btn.classList.add('on');
        btn.classList.remove('off');
        icon.classList.replace('bi-volume-mute', 'bi-volume-up-fill');
        console.log("Niharika Voice: ENABLED");
    } else {
        btn.classList.add('off');
        btn.classList.remove('on');
        icon.classList.replace('bi-volume-up-fill', 'bi-volume-mute');
        
        window.speechSynthesis.cancel(); 
        if (typeof setLogoState === "function") setLogoState('idle');
        console.log("Niharika Voice: DISABLED");
    }
}

// Toggle Microphone Listening
function toggleMic() {
    if (!isMicEnabled) {
        startNiharikaListening();
    } else {
        stopNiharikaListening();
    }
}

function startNiharikaListening() {
    const btn = document.getElementById('micToggle');
    const icon = document.getElementById('micIcon');
    const wrapper = document.querySelector('.input-wrapper'); // Target the wrapper

    if (!recognition) initVoiceRecognition();

    try {
        isMicEnabled = true;
        recognition.start();
        
        if (btn) btn.classList.replace('off', 'on');
        if (icon) icon.classList.replace('bi-mic-mute', 'bi-mic-fill');
        
        // Add the active class for the red border and blink effect
        if (wrapper) wrapper.classList.add('listening-active');
        
        setLogoState('listening');
        console.log("Niharika is listening...");
    } catch (e) { /* Already running */ }
}



function stopNiharikaListening() {
    const btn = document.getElementById('micToggle');
    const icon = document.getElementById('micIcon');
    const wrapper = document.querySelector('.input-wrapper'); // Target the wrapper


    isMicEnabled = false;
    try { 
        recognition.stop(); 
        if (btn) btn.classList.replace('on', 'off');
        if (icon) icon.classList.replace('bi-mic-fill', 'bi-mic-mute');
        console.log("Mic stopped.");
        if (wrapper) wrapper.classList.remove('listening-active');

    } catch(e) { /* Already stopped */ }
}

window.addEventListener('DOMContentLoaded', () => {
